<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Email Automation UI</title>
</head>
<body>
  <div id="root"></div>

  <!-- React from CDN for quick prototype -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

  <script>
    const { useEffect, useState } = React;
    const POLL_INTERVAL_MS = 2000;

    function formatCampaignMessage(campaign) {
      if (!campaign) return '';
      if (campaign.message) return campaign.message;
      return `Campaign ${campaign.status}`;
    }

    function App() {
      const [file, setFile] = useState(null);
      const [message, setMessage] = useState('');
      const [campaign, setCampaign] = useState(null);

      const loadCampaignStatus = async () => {
        try {
          const res = await axios.get('/api/campaign/status/');
          setCampaign(res.data);
        } catch (err) {
          // Keep the last visible state if polling fails briefly.
        }
      };

      useEffect(() => {
        loadCampaignStatus();
      }, []);

      useEffect(() => {
        if (campaign?.status !== 'running') {
          return undefined;
        }

        const timer = setInterval(loadCampaignStatus, POLL_INTERVAL_MS);
        return () => clearInterval(timer);
      }, [campaign?.status]);

      const upload = async () => {
        if (!file) return;
        try {
          const form = new FormData();
          form.append('file', file);
          const res = await axios.post('/api/leads/upload/', form, {
            headers: {'Content-Type': 'multipart/form-data'}
          });
          setMessage(`Created ${res.data.created} leads`);
        } catch (err) {
          const detail = err?.response?.data?.error || err.message || 'Upload failed';
          setMessage(`Upload failed: ${detail}`);
        }
      };

      const start = async () => {
        try {
          setMessage('');
          const res = await axios.post('/api/campaign/start/');
          setCampaign(res.data.campaign || null);
          setMessage(formatCampaignMessage(res.data.campaign) || res.data.status);
        } catch (err) {
          const detail = err?.response?.data?.error || err.message || 'Failed to start campaign';
          setMessage(`Start failed: ${detail}`);
          if (err?.response?.data?.campaign) {
            setCampaign(err.response.data.campaign);
          }
        }
      };

      const isCampaignRunning = campaign?.status === 'running';

      return React.createElement('div', null,
        React.createElement('h1', null, 'Email Automation Dashboard'),
        React.createElement('input', { type: 'file', onChange: e => setFile(e.target.files[0]) }),
        React.createElement('button', { onClick: upload }, 'Upload Leads'),
        React.createElement('button', { onClick: start, disabled: isCampaignRunning }, isCampaignRunning ? 'Campaign Running...' : 'Start Campaign'),
        React.createElement('p', null, message),
        campaign && React.createElement('div', null,
          React.createElement('p', null, `Status: ${campaign.status}`),
          React.createElement('p', null, `Progress: ${campaign.processed}/${campaign.total}`),
          React.createElement('p', null, `Sent: ${campaign.sent} | Skipped: ${campaign.skipped} | Failed: ${campaign.failed}`),
          React.createElement('p', null, formatCampaignMessage(campaign))
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
